# pv.yaml
apiVersion: v1
kind: PersistentVolume
metadata:
  name: metrics-exporter-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path 
  hostPath:
    path: "/mnt/metrics"  # Ensure this path exists on your node
  persistentVolumeReclaimPolicy: Retain
---
# pv-metadata-collector.yaml
apiVersion: v1
